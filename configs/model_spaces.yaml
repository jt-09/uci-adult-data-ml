tuning:
  n_iter: 20
  cv_folds: 5
  scoring: f1_macro
  random_state: 42
  n_jobs: -1

models:
  dummy:
    strategy: ["most_frequent"]
  logistic_regression:
    C: [0.01, 0.1, 1.0, 10.0]
    max_iter: [1000]
    class_weight: [null, balanced]
  decision_tree:
    max_depth: [5, 10, 15, 20, null]
    min_samples_leaf: [1, 5, 10, 20]
    class_weight: [null, balanced]
  random_forest:
    n_estimators: [100, 200, 300]
    max_depth: [10, 20, null]
    min_samples_leaf: [1, 5]
    class_weight: [null, balanced]
  hist_gradient_boosting:
    max_depth: [3, 5, 8]
    learning_rate: [0.05, 0.1]
    max_iter: [100, 200]
  xgboost:
    n_estimators: [100, 200]
    max_depth: [3, 5, 7]
    learning_rate: [0.05, 0.1]
    subsample: [0.8, 1.0]
  lightgbm:
    n_estimators: [100, 200]
    max_depth: [3, 5, 7]
    learning_rate: [0.05, 0.1]
    num_leaves: [31, 63]
  mlp_sklearn:
    hidden_layer_sizes: [[64, 32], [128, 64]]
    alpha: [0.0001, 0.001]
    max_iter: [300]
    early_stopping: [true]
  mlp_torch:
    embedding_dim: [8, 16]
    hidden_dims: [[64, 32], [128, 64]]
    dropout: [0.1, 0.2]
    lr: [0.001, 0.0005]
    epochs: [30]
    batch_size: [256]
