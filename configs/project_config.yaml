project:
  name: adult-income-ml-study
  seed: 42
  n_jobs: -1

paths:
  raw_dir: data/raw
  interim_dir: data/interim
  processed_dir: data/processed
  results_dir: results
  reports_dir: reports

dataset:
  uci_id: 2
  raw_filename: adult_raw.csv
  clean_filename: adult_clean.csv
  target_column: income
  positive_label: ">50K"
  negative_label: "<=50K"
  missing_token: "?"
  drop_duplicates: true

columns:
  numeric:
    - age
    - fnlwgt
    - education-num
    - capital-gain
    - capital-loss
    - hours-per-week
  categorical:
    - workclass
    - education
    - marital-status
    - occupation
    - relationship
    - race
    - sex
    - native-country
  sensitive:
    - sex
    - race
  drop_for_extension:
    - sex
    - race

split:
  test_size: 0.2
  stratify: true
  random_state: 42

cv:
  n_splits: 5
  scoring: f1_macro

fairness:
  min_subgroup_size: 30

plotting:
  dpi: 150
  style: seaborn-v0_8-whitegrid
  figsize: [10, 6]
